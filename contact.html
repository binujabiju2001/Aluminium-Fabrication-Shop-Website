<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body style="background-color: beige;">
    <section id="contact" class="p-3">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <div class="card mt-3">
                        <div class="card-body bg-primary text-center text-white">
                            <h2>Contact us for booking</h2>
                            <p>For bookings or inquiries, please contact us today!</p>
                        </div>
                    </div>
                    <ul class="list-group">
                        <li class="list-group-item">
                            <h3>LOCATION</h3>
                        </li>
                        <li class="list-group-item">
                            G.S ALUMINIUM FABRICATION
                        </li>
                        <li class="list-group-item">
                            MAIN ROAD OPP PETROL PUMP KOTTAVATTOM JUNCTION, ELAMPAL, PUNALUR
                        </li>
                        <li class="list-group-item">
                            KERALA, INDIA
                        </li>
                    </ul>
                </div>

                <div class="col-md-6">
                    <div class="card mt-3">
                        <div class="card-header bg-primary text-white text-center">
                            <h3>CONTACT US</h3>
                        </div>
                        <div class="card-body bg-light">
                            <form>
                                <div class="mb-3">
                                    <input type="text" class="form-control" placeholder="ENTER YOUR NAME">
                                </div>

                                <div class="mb-3">
                                    <input type="email" class="form-control" placeholder="ENTER YOUR EMAIL">
                                </div>

                                <div class="mb-3">
                                    <input type="number" class="form-control" placeholder="ENTER YOUR PHONE NUMBER">
                                </div>
                                
                                <div class="mb-3">
                                    <input type="text" class="form-control" placeholder="ENTER THE SERVICE REQUIRED">
                                </div>

                                <div class="mb-3">
                                    <textarea class="form-control" rows="5" placeholder="(SHARE MORE DETAILS)"></textarea>
                                </div>

                                <div class="mt-2 d-grid gap-2">
                                    <button type="submit" class="btn btn-outline-info px-5">
                                        SEND
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- "Locate Us" link that opens map details -->
    
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

                                allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>

            </details>
        </div>
    </body>
    </html>
    
    
    <a href="travelwebsite.html" class="btn btn-outline-info mt-3">HOME</a>
    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
